name: 'Iago — PR diagram bot'
description: 'Append a Mermaid diagram (sequence/flow/class/er) to a PR comment when someone says /iago. Greptile-style, BYO LLM.'
author: 'drakulavich'
branding:
  icon: 'feather'
  color: 'orange'

inputs:
  github-token:
    description: 'GitHub token with `pull-requests: write` permission. Defaults to ${{ github.token }}.'
    required: false
    default: ${{ github.token }}

  trigger:
    description: 'Comment trigger phrase. The Action only acts on comments whose body starts with this. Default: /iago'
    required: false
    default: '/iago'

  diagram-type:
    description: 'Force a diagram type. One of: auto, sequence, flow, class, er. Default: auto.'
    required: false
    default: 'auto'

  mode:
    description: 'append (edit existing /review comment) or comment (post new). Default: append.'
    required: false
    default: 'append'

  llm-provider:
    description: 'LLM provider for diagram generation: anthropic, openai, or none. Default: auto-detected from available API keys; falls back to heuristic.'
    required: false
    default: 'auto'

  anthropic-api-key:
    description: 'Anthropic API key (required if llm-provider=anthropic).'
    required: false

  openai-api-key:
    description: 'OpenAI API key (required if llm-provider=openai).'
    required: false

  llm-model:
    description: 'Model to use. Default: claude-sonnet-4-5 for anthropic, gpt-4o-mini for openai.'
    required: false
    default: ''

  review-comment-marker:
    description: 'Marker to find the /review comment when mode=append. Default: <!-- review-skill -->.'
    required: false
    default: '<!-- review-skill -->'

outputs:
  comment-url:
    description: 'URL of the comment that was edited or created.'
    value: ${{ steps.iago.outputs.comment_url }}
  diagram-type:
    description: 'Diagram type that was generated, or "skipped" if Iago abstained.'
    value: ${{ steps.iago.outputs.diagram_type }}

runs:
  using: 'composite'
  steps:
    - name: Validate trigger
      id: trigger
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        TRIGGER: ${{ inputs.trigger }}
      run: |
        set -euo pipefail
        if [[ "$EVENT_NAME" != "issue_comment" ]]; then
          echo "Iago only runs on issue_comment events; got '$EVENT_NAME'. Skipping."
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        first_line="$(printf '%s' "$COMMENT_BODY" | head -n1 | tr -d '\r')"
        first_line="${first_line## }"
        if [[ "$first_line" != "$TRIGGER"* ]]; then
          echo "Comment doesn't start with trigger '$TRIGGER'. Skipping."
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # Parse args after trigger: e.g. "/iago 230 sequence --mode=comment"
        args="${first_line#${TRIGGER}}"
        echo "args=$args" >> "$GITHUB_OUTPUT"
        echo "should_run=true" >> "$GITHUB_OUTPUT"

    - name: Check it's a PR comment
      if: steps.trigger.outputs.should_run == 'true'
      id: check_pr
      shell: bash
      env:
        IS_PR: ${{ github.event.issue.pull_request != null }}
      run: |
        if [[ "$IS_PR" != "true" ]]; then
          echo "Comment is on an issue, not a PR. Skipping."
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "should_run=true" >> "$GITHUB_OUTPUT"

    - name: React 👀 to acknowledge
      if: steps.check_pr.outputs.should_run == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        COMMENT_ID: ${{ github.event.comment.id }}
      run: |
        gh api -X POST \
          -H "Accept: application/vnd.github+json" \
          "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
          -f content=eyes >/dev/null || true

    - name: Set up Python
      if: steps.check_pr.outputs.should_run == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python deps
      if: steps.check_pr.outputs.should_run == 'true'
      shell: bash
      run: |
        python3 -m pip install --quiet --disable-pip-version-check 'anthropic>=0.40' 'openai>=1.50' 'unidiff>=0.7'

    - name: Run Iago
      if: steps.check_pr.outputs.should_run == 'true'
      id: iago
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.issue.number }}
        TRIGGER_ARGS: ${{ steps.trigger.outputs.args }}
        IAGO_DIAGRAM_TYPE: ${{ inputs.diagram-type }}
        IAGO_MODE: ${{ inputs.mode }}
        IAGO_LLM_PROVIDER: ${{ inputs.llm-provider }}
        IAGO_LLM_MODEL: ${{ inputs.llm-model }}
        IAGO_REVIEW_MARKER: ${{ inputs.review-comment-marker }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        python3 "${ACTION_PATH}/action/scripts/run.py"

    - name: React 🚀 on success
      if: steps.check_pr.outputs.should_run == 'true' && success()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        COMMENT_ID: ${{ github.event.comment.id }}
      run: |
        gh api -X POST \
          -H "Accept: application/vnd.github+json" \
          "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
          -f content=rocket >/dev/null || true

    - name: React 😕 on failure
      if: steps.check_pr.outputs.should_run == 'true' && failure()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        COMMENT_ID: ${{ github.event.comment.id }}
      run: |
        gh api -X POST \
          -H "Accept: application/vnd.github+json" \
          "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
          -f content=confused >/dev/null || true
